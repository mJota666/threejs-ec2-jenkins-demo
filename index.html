<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive 3D mentor football cards." />
    <title>Mentor Card Showcase</title>
  </head>
  <body>
    <main id="app" aria-label="3D mentor card showcase">
      <section class="card-stage">
        <article class="player-card card-gold" data-card>
          <div class="card-inner">
            <div class="energy-ring"></div>
            <div class="card-meta">
              <strong>99</strong>
              <span>LEAD</span>
            </div>
            <div class="club-mark">MENTOR</div>
            <div class="player-frame">
              <div class="player-photo" style="--mentor-image: url('/mentors/wyatt.svg')"></div>
            </div>
            <div class="player-name">Wyatt Truong</div>
            <div class="stat-grid">
              <span><b>98</b> ARCH</span>
              <span><b>97</b> SHIP</span>
              <span><b>99</b> LEAD</span>
              <span><b>96</b> CODE</span>
              <span><b>95</b> OPS</span>
              <span><b>99</b> IQ</span>
            </div>
          </div>
        </article>

        <article class="player-card card-blue" data-card>
          <div class="card-inner">
            <div class="energy-ring"></div>
            <div class="card-meta">
              <strong>97</strong>
              <span>PLAY</span>
            </div>
            <div class="club-mark">MENTOR</div>
            <div class="player-frame">
              <div class="player-photo" style="--mentor-image: url('/mentors/vu.svg')"></div>
            </div>
            <div class="player-name">Vu Tran</div>
            <div class="stat-grid">
              <span><b>96</b> ARCH</span>
              <span><b>98</b> SHIP</span>
              <span><b>95</b> LEAD</span>
              <span><b>99</b> CODE</span>
              <span><b>94</b> OPS</span>
              <span><b>97</b> IQ</span>
            </div>
          </div>
        </article>

        <article class="player-card card-red" data-card>
          <div class="card-inner">
            <div class="energy-ring"></div>
            <div class="card-meta">
              <strong>96</strong>
              <span>CORE</span>
            </div>
            <div class="club-mark">MENTOR</div>
            <div class="player-frame">
              <div class="player-photo" style="--mentor-image: url('/mentors/danh.svg')"></div>
            </div>
            <div class="player-name">Danh Bui</div>
            <div class="stat-grid">
              <span><b>94</b> ARCH</span>
              <span><b>96</b> SHIP</span>
              <span><b>97</b> LEAD</span>
              <span><b>95</b> CODE</span>
              <span><b>99</b> OPS</span>
              <span><b>96</b> IQ</span>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
