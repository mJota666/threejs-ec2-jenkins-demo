<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Three.js static site deployed to EC2 with Jenkins." />
    <title>Three.js EC2 Jenkins Demo</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scene" aria-label="Interactive 3D scene"></canvas>
      <section class="hud" aria-label="Project status">
        <p class="eyebrow">Release v2 / Interactive Three.js</p>
        <h1>Orbital Command</h1>
        <p>
          Pilot the camera, switch the station mode, and watch the whole scene
          react in real time after the Jenkins redeploy.
        </p>
        <div class="stats">
          <span>Drag to orbit</span>
          <span>WASD to move</span>
          <span>Shift to boost</span>
        </div>
      </section>
      <aside class="control-panel" aria-label="Scene controls">
        <div class="mode-tabs" role="group" aria-label="Station mode">
          <button class="mode-button is-active" type="button" data-mode="launch">Launch</button>
          <button class="mode-button" type="button" data-mode="scan">Scan</button>
          <button class="mode-button" type="button" data-mode="storm">Storm</button>
        </div>
        <div class="telemetry">
          <span>Velocity</span>
          <strong id="velocity-readout">1.0x</strong>
        </div>
        <div class="telemetry">
          <span>Mode</span>
          <strong id="mode-readout">Launch</strong>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
